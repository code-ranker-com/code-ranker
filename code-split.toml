# code-split.toml — project-level configuration for code-split
plugin = "rust"   # default plugin; overridden by --plugin

# ── Output ─────────────────────────────────────────────────────────────────────
# Default artifact filenames for `report`. A `--json-name` / `--html-name` flag
# still overrides these. Placeholders: {project-dir}, {ts}, {git-hash},
# {git-hash-N} (first N chars of the commit). Built-in default if unset:
# "{ts}-{git-hash-3}.json".
[output]
json-name = "{project-dir}-{ts}.json"
html-name = "{project-dir}-{ts}.html"
