# JavaScript language config — inherits `../defaults.toml` (see `../config.rs`).
#
# The JavaScript metric engine's tree-sitter node-kind tables are shared with
# TypeScript and live in `../ecmascript/ecmascript.toml` (both dialects reuse the
# same engine). This file therefore carries only what is JavaScript-specific to
# the language-neutral config layer: its principle-corpus language for doc links.
#
# JavaScript adds NO metric-lens presets of its own — it inherits the common
# catalog from `defaults.toml`. Its principle docs share the TypeScript corpus
# (matching the historical `principle_lang` mapping js → typescript), so
# `doc_url` = `{doc_base}/typescript/<slug>.md`.

# Principle-corpus language for doc links (`doc_base` inherited from defaults).
doc_lang = "typescript"

# ──────────────────────────────────────────────────────────────────────────────
# File-collection extensions and project-detect markers — DATA, not code (see
# `../README.md` §3). `extensions` drives BOTH which files the walker collects
# AND the candidate-extension order for resolving an extensionless import (a
# JS-only project resolves `./foo` against these in order). `detect_markers`
# are the project-root marker filenames the plugin's `detect()` looks for. The
# `ext → grammar` match in `mod.rs` (which binds a string to a grammar TYPE)
# stays in Rust.
# ──────────────────────────────────────────────────────────────────────────────

extensions = ["js", "jsx", "mjs", "cjs"]
detect_markers = ["package.json"]
